<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pour Chloé ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    
    <style>
        :root { --pink: #f472b6; --dark: #0f172a; }
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--dark); font-family: 'Segoe UI', Roboto, sans-serif; color: white; overflow: hidden; text-align: center; }
        
        /* Styles Communs Questions */
        .step { display: none; padding: 20px; animation: fadeIn 0.5s ease-in; z-index: 10; width: 100%; box-sizing: border-box; }
        .step.active { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        h1 { font-size: 2rem; margin-bottom: 30px; color: var(--pink); line-height: 1.3; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        button { background: var(--pink); border: none; padding: 15px 40px; color: white; font-size: 1.1rem; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(244, 114, 182, 0.4); transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.95); }

        /* Animation Background Coeurs (Dernière Page) */
        @keyframes floatHearts {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .heart { position: absolute; color: rgba(244, 114, 182, 0.5); pointer-events: none; animation: floatHearts linear infinite; z-index: 1; }

        /* Styles Spécifiques Final (Étape 5) */
        #step5 h1 { font-size: 2.2rem; margin-bottom: 5px; margin-top: 10px; background: linear-gradient(45deg, #f472b6, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .final-txt { font-size: 1rem; opacity: 0.9; margin-bottom: 15px; margin-top: 0; }

        /* Style de l'Album Photo (Swiper) */
        .swiper { width: 260px; height: 320px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 3px solid white; margin-bottom: 15px; }
        .swiper-slide { background-position: center; background-size: cover; border-radius: 17px; background-color: #333; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 0.8rem; }
        .swiper-pagination-bullet-active { background: var(--pink) !important; }

        /* Style Stylé pour le texte du cadeau */
        .gift-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            margin-top: 10px;
            opacity: 0; /* Caché au début */
            transform: translateY(20px);
            transition: all 0.8s ease-out; /* Animation douce */
            text-shadow: 0 0 10px rgba(244, 114, 182, 0.8);
        }
        
        /* Classe activée par JS quand on arrive à la dernière image */
        .gift-text.show {
            opacity: 1;
            transform: translateY(0);
            animation: pulseText 2s infinite 0.8s; /* Pulsation après l'apparition */
        }

        /* Keyframes */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseText {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(244, 114, 182, 0.8); }
            50% { transform: scale(1.05); text-shadow: 0 0 20px rgba(244, 114, 182, 1); }
        }
    </style>
</head>
<body>

    <div id="hearts-container" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;"></div>

    <div class="step active" id="step1">
        <h1>Est-ce que tu es Chloé ?</h1>
        <button onclick="nextStep(2)">Oui, c'est moi !</button>
    </div>

    <div class="step" id="step2">
        <h1>Est-ce que tu es magnifique ?</h1>
        <button onclick="nextStep(3)">Évidemment ✨</button>
    </div>

    <div class="step" id="step3">
        <h1>Est-ce que tu es la meilleure copine du monde ?</h1>
        <button onclick="nextStep(4)">Sans aucun doute ❤️</button>
    </div>

    <div class="step" id="step4">
        <h1>Est-ce que tu es beaucoup trop mignonne ?</h1>
        <button onclick="nextStep(5)">Peut-être bien... 😊</button>
    </div>

    <div class="step" id="step5">
        <h1>JOYEUX<br>18 ANS CHLOÉ ! 🎉</h1>
        <p class="final-txt">Le grand jour est là ! Majeure ! ❤️</p>
        
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide" style="background-image: url('photo1.jpg');"></div>
                <div class="swiper-slide" style="background-image: url('photo2.jpg');"></div>
                <div class="swiper-slide" style="background-image: url('photo3.jpg');"></div>
                <div class="swiper-slide" style="background-image: url('photo4.jpg');"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>

        <div class="gift-text" id="gift-message">
            🎁 À samedi pour ton cadeau ! 🎁
        </div>
    </div>

    <script>
        function nextStep(num) {
            // Cacher les étapes
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            // Afficher la nouvelle
            const current = document.getElementById('step' + num);
            current.classList.add('active');

            // --- Logique Spécifique Étape Finale ---
            if(num === 5) {
                // 1. Activer le fond animé
                document.getElementById('hearts-container').style.display = 'block';
                createHearts();

                // 2. Initialiser l'album photo (Swiper)
                const swiper = new Swiper(".mySwiper", {
                    effect: "cards",
                    grabCursor: true,
                    pagination: { el: ".swiper-pagination", dynamicBullets: true },
                    // Détecter le changement de slide
                    on: {
                        slideChange: function () {
                            const giftMessage = document.getElementById('gift-message');
                            // Vérifier si on est sur la dernière image (index 3 car on commence à 0)
                            if (this.activeIndex === 3) {
                                giftMessage.classList.add('show'); // Faire apparaître le texte
                            } else {
                                giftMessage.classList.remove('show'); // Le cacher si on revient en arrière
                            }
                        },
                    },
                });

                // 3. Pluie de confettis intense
                var duration = 8 * 1000;
                var animationEnd = Date.now() + duration;
                var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
                var interval = setInterval(function() {
                    var timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) return clearInterval(interval);
                    var particleCount = 60 * (timeLeft / duration);
                    confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
                }, 200);
            }
        }

        // Fonction pour générer les coeurs en fond
        function createHearts() {
            const container = document.getElementById('hearts-container');
            const heartTypes = ['❤️', '💖', '🌸', '✨'];
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; // Entre 2 et 5s
                heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
                container.appendChild(heart);
            }
        }
    </script>
</body>
</html>
